# =================================================
# CampusHat — Docker Compose (Full Stack)
# =================================================
# Single image for backend services, shared across
# Django, Celery Worker, and Celery Beat.
#
# Usage: docker-compose up --build
# =================================================

services:
  # =============================================
  # INFRASTRUCTURE
  # =============================================

  db:
    image: postgres:15-alpine
    container_name: campushat_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-campushat_db}
      POSTGRES_USER: ${DB_USER:-campushat_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-campushat_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - campushat_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-campushat_user} -d ${DB_NAME:-campushat_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: campushat_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - campushat_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================
  # BACKEND — Single image, multiple services
  # =============================================

  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    image: campushat-backend:latest
    container_name: campushat_backend
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_media:/app/mediafiles
      - backend_static:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - campushat_network

  celery:
    image: campushat-backend:latest
    container_name: campushat_celery
    restart: unless-stopped
    command: celery -A config worker --loglevel=info --concurrency=2
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - campushat_network

  celerybeat:
    image: campushat-backend:latest
    container_name: campushat_celerybeat
    restart: unless-stopped
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - campushat_network

  # =============================================
  # FRONTEND (uncomment when frontend is built)
  # =============================================

  frontend:
    image: node:18-alpine
    container_name: campushat_frontend
    user: "root"
    restart: unless-stopped
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install --legacy-peer-deps && npm run dev"
    environment:
      # User PC-তে 80/8080 busy থাকলে, nginx যে port-এ expose হবে সেটাই এখানে দিন
      - NEXT_PUBLIC_API_URL=http://localhost:8081/api/v1
    networks:
      - campushat_network

  # =============================================
  # REVERSE PROXY
  # =============================================

  nginx:
    image: nginx:1.25-alpine
    container_name: campushat_nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_static:/app/staticfiles:ro
      - backend_media:/app/mediafiles:ro
    depends_on:
      - backend
    networks:
      - campushat_network

volumes:
  postgres_data:
    name: campushat_postgres_data
  redis_data:
    name: campushat_redis_data
  backend_media:
    name: campushat_backend_media
  backend_static:
    name: campushat_backend_static
  frontend_node_modules:
    name: campushat_frontend_node_modules

networks:
  campushat_network:
    name: campushat_network
    driver: bridge
