# =================================================
# CampusHat — Production Docker Compose (Full Stack)
# =================================================
# Single command: docker-compose -f docker-compose.prod.yml up -d --build
#
# This is what runs on the live server. Everything is production-grade:
#   • Django backend served by gunicorn (4 workers, threaded)
#   • Next.js frontend pre-built (no HMR overhead) → 5-10x faster than dev
#   • Nginx with gzip + cache headers
#   • PostgreSQL with persistent volume
#   • Redis for cache + Celery
# =================================================

services:
  # =============================================
  # INFRASTRUCTURE
  # =============================================
  db:
    image: postgres:15-alpine
    container_name: campushat_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-campushat_db}
      POSTGRES_USER: ${DB_USER:-campushat_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-campushat_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - campushat_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-campushat_user} -d ${DB_NAME:-campushat_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: campushat_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - campushat_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================
  # BACKEND — Django + Gunicorn (production)
  # =============================================
  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile.prod
    image: campushat-backend:prod
    container_name: campushat_backend
    restart: unless-stopped
    # Daphne (ASGI) handles both HTTP and WebSocket — Gunicorn (WSGI) cannot do WebSocket.
    command: ["sh", "-c", "python manage.py collectstatic --noinput && python manage.py migrate --noinput && python manage.py seed_universities && daphne -b 0.0.0.0 -p 8000 --proxy-headers config.asgi:application"]
    environment:
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE:-config.settings.production}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    env_file:
      - ./backend/.env
    expose:
      - "8000"
    volumes:
      - backend_media:/app/mediafiles
      - backend_static:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - campushat_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8000/api/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  celery:
    image: campushat-backend:prod
    container_name: campushat_celery
    restart: unless-stopped
    command: celery -A config worker --loglevel=warning --concurrency=${CELERY_CONCURRENCY:-2}
    environment:
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE:-config.settings.production}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - campushat_network

  celerybeat:
    image: campushat-backend:prod
    container_name: campushat_celerybeat
    restart: unless-stopped
    command: celery -A config beat --loglevel=warning --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE:-config.settings.production}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - campushat_network

  # =============================================
  # FRONTEND — Next.js (production build, no HMR)
  # =============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # These are baked into the JS bundle at build time — must be set before `docker-compose up --build`.
        # Set them in the root-level .env file (see .env.example at project root).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    image: campushat-frontend:prod
    container_name: campushat_frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - campushat_network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # =============================================
  # REVERSE PROXY — Nginx (gzip, cache, SSL-ready)
  # =============================================
  nginx:
    image: nginx:1.25-alpine
    container_name: campushat_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_static:/app/staticfiles:ro
      - backend_media:/app/mediafiles:ro
      - certbot_data:/etc/letsencrypt:rw
      - certbot_www:/var/www/certbot:rw
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - campushat_network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    name: campushat_prod_postgres
  redis_data:
    name: campushat_prod_redis
  backend_media:
    name: campushat_prod_media
  backend_static:
    name: campushat_prod_static
  certbot_data:
    name: campushat_prod_certbot
  certbot_www:
    name: campushat_prod_certbot_www

networks:
  campushat_network:
    name: campushat_prod_network
    driver: bridge
