# =================================================
# CampusHat — Nginx Reverse Proxy (Full Stack)
# =================================================
# Routes traffic to backend and frontend services
#
# Traffic flow:
#   Browser → Nginx (port 8081 on host → 80 inside container)
#       /api/*          → Django backend (port 8000)
#       /django-admin/* → Django built-in admin (port 8000)
#       /static/*       → Static files (direct)
#       /media/*        → Media files (direct)
#       /*              → Next.js frontend (port 3000) — includes /admin (CampusHat panel)
# =================================================

upstream campushat_backend {
    server backend:8000;
}

# Uncomment when frontend is built:
upstream campushat_frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 20M;

    # --- API: Proxy to Django ---
    location /api/ {
        proxy_pass http://campushat_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    # --- Django built-in admin (moved to avoid conflict with Next.js /admin panel) ---
    location /django-admin/ {
        proxy_pass http://campushat_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Static files ---
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- Media files ---
    location /media/ {
        alias /app/mediafiles/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # --- Health check ---
    location /health/ {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # --- Frontend: Proxy to Next.js (dev with HMR WebSocket) ---
    location / {
        proxy_pass http://campushat_frontend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Tell Next.js the real external host+port so middleware redirects are correct
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
        # WebSocket support — required for Next.js HMR hot-reload
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Long timeouts so HMR WebSocket stays open during development
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
