# =================================================
# CampusHat — Nginx Reverse Proxy (Full Stack)
# =================================================
# Routes traffic to backend and frontend services
#
# Traffic flow:
#   Browser → Nginx (port 80)
#       /api/*     → Django backend (port 8000)
#       /admin/*   → Django backend (port 8000)
#       /static/*  → Static files (direct)
#       /media/*   → Media files (direct)
#       /*         → Frontend app (port 3000) [when enabled]
# =================================================

upstream campushat_backend {
    server backend:8000;
}

# Uncomment when frontend is built:
upstream campushat_frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 20M;

    # --- API: Proxy to Django ---
    location /api/ {
        proxy_pass http://campushat_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    # --- Admin: Proxy to Django ---
    location /admin/ {
        proxy_pass http://campushat_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Static files ---
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- Media files ---
    location /media/ {
        alias /app/mediafiles/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # --- Health check ---
    location /health/ {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # --- Frontend: Proxy to Next.js/React ---
    location / {
        proxy_pass http://campushat_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
