# =================================================
# CampusHat — Production Nginx (Full Stack)
# =================================================
# Routes:
#   /api/*          → Django backend (gunicorn)
#   /django-admin/* → Django built-in admin
#   /static/*       → Django static files
#   /media/*        → Uploaded media files
#   /_next/*        → Next.js compiled assets (long cache)
#   /*              → Next.js frontend (production build)
# =================================================

# Compression — saves 60-80% on response size
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/xml+rss
    application/atom+xml
    image/svg+xml
    font/woff
    font/woff2;

upstream campushat_backend {
    server backend:8000;
    keepalive 32;
}

upstream campushat_frontend {
    server frontend:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name campushat.com www.campushat.com 178.128.122.157;
    client_max_body_size 20M;

    # Certbot ACME challenge (for SSL renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- API: Proxy to Django backend ---
    location /api/ {
        proxy_pass http://campushat_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    # --- Django built-in admin ---
    location /django-admin/ {
        proxy_pass http://campushat_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # --- WebSocket support for Django Channels (marketplace chat) ---
    location /ws/ {
        proxy_pass http://campushat_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # --- Django static files (admin css, drf-spectacular assets) ---
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- User-uploaded media ---
    location /media/ {
        alias /app/mediafiles/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # --- Next.js compiled assets (very aggressive caching, hashed filenames) ---
    location /_next/static/ {
        proxy_pass http://campushat_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --- Health check ---
    location /health/ {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # --- Next.js frontend (everything else) ---
    location / {
        proxy_pass http://campushat_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";
    }
}
