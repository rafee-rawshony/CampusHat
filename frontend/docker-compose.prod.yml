version: "3.9"

services:
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000}
    ports:
      - "80:80"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
