# =================================================
# CampusHat Backend — Docker Compose (Production)
# =================================================
# Overrides for production deployment.
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# =================================================

version: '3.8'

services:
  # --- Django Backend (Production) ---
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate --noinput &&
             gunicorn config.wsgi:application
               --bind 0.0.0.0:8000
               --workers 4
               --threads 2
               --worker-class gthread
               --timeout 120
               --access-logfile -
               --error-logfile -"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    ports: [] # Only expose via nginx in production

  # --- Celery Worker (Production) ---
  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    command: celery -A config worker --loglevel=warning --concurrency=4
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production

  # --- Celery Beat (Production) ---
  celerybeat:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    command: celery -A config beat --loglevel=warning --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production

  # --- Nginx (Production) ---
  nginx:
    ports:
      - "80:80"
      - "443:443"
