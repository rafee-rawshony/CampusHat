# =================================================
# CampusHat — Production Nginx + SSL Configuration
# =================================================
# Works with Certbot/Let's Encrypt for auto-SSL.
# Compatible with any VPS: Contabo, AWS, DigitalOcean, Hostinger.
#
# On first deploy (before SSL):
#   1. Set DOMAIN in .env.production
#   2. Run: docker compose -f docker-compose.prod.yml up -d
#   3. Run: docker exec campushat_nginx certbot --nginx -d yourdomain.com
#   4. Certbot auto-renews via cron inside the container.
# =================================================

upstream campushat_backend {
    server backend:8000;
}

# --- HTTP: keep available for non-SSL mode and ACME challenges ---
server {
    listen 80;
    server_name localhost campushat.com www.campushat.com 178.128.122.157;
    client_max_body_size 20M;

    # Certbot ACME challenge (must remain on port 80)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # --- API & Admin: Proxy to Django ---
    location /api/ {
        proxy_pass http://campushat_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    location /django-admin/ {
        proxy_pass http://campushat_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /admin/ {
        proxy_pass http://campushat_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # --- Static files ---
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- Media files ---
    location /media/ {
        alias /app/mediafiles/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # --- Health check ---
    location /health/ {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}

server {
    listen 443 ssl;
    server_name localhost campushat.com www.campushat.com 178.128.122.157;
    client_max_body_size 20M;

    ssl_certificate /etc/letsencrypt/live/campushat.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/campushat.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    location /api/ {
        proxy_pass http://campushat_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    location /django-admin/ {
        proxy_pass http://campushat_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /admin/ {
        proxy_pass http://campushat_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /app/mediafiles/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /health/ {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
